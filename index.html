<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Mahmoud Bassiony — Software Engineer. Backend-focused portfolio."
    />
    <title>Mahmoud Bassiony · Software Engineer</title>
    <script>
      // apply saved theme before first paint to avoid flash
      // (?theme=light|dark overrides, handy for sharing/screenshots)
      const q = new URLSearchParams(location.search).get("theme");
      if (q === "light" || q === "dark") localStorage.theme = q;
      if (
        localStorage.theme === "dark" ||
        (!("theme" in localStorage) &&
          matchMedia("(prefers-color-scheme: dark)").matches)
      ) {
        document.documentElement.classList.add("dark");
      }
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
